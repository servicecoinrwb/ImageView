<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paul Revere Pepe</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=MedievalSharp&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0e05;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Georgia', serif;
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: 700px;
    height: 600px;
  }

  /* Night sky background */
  .bg {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top, #0d1b3e 0%, #060a1a 60%, #1a0e05 100%);
    border-radius: 16px;
    overflow: hidden;
    border: 3px solid #8b6914;
    box-shadow: 0 0 60px rgba(255,180,0,0.15), inset 0 0 80px rgba(0,0,0,0.5);
  }

  .stars {
    position: absolute;
    inset: 0;
  }

  .moon {
    position: absolute;
    top: 30px;
    right: 80px;
    width: 60px;
    height: 60px;
    background: radial-gradient(circle at 35% 35%, #fff9c4, #f5d020);
    border-radius: 50%;
    box-shadow: 0 0 20px rgba(245,208,32,0.6);
  }

  .ground {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 140px;
    background: linear-gradient(180deg, #1a3a0a 0%, #0d2206 100%);
    border-radius: 0 0 13px 13px;
  }

  .road {
    position: absolute;
    bottom: 40px;
    left: 0;
    right: 0;
    height: 30px;
    background: #3a2a1a;
    opacity: 0.6;
  }

  .building {
    position: absolute;
    bottom: 130px;
    background: #0a1a0a;
    border: 1px solid #1a3a1a;
  }

  /* Speech bubble */
  .speech-bubble {
    position: absolute;
    top: 20px;
    left: 20px;
    background: #fffde7;
    border: 3px solid #5c3d0a;
    border-radius: 18px;
    padding: 14px 20px;
    max-width: 280px;
    box-shadow: 4px 4px 0 #5c3d0a;
    z-index: 10;
    animation: wobble 2s ease-in-out infinite;
  }

  .speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -22px;
    right: 60px;
    border: 11px solid transparent;
    border-top-color: #5c3d0a;
  }

  .speech-bubble::before {
    content: '';
    position: absolute;
    bottom: -14px;
    right: 63px;
    border: 9px solid transparent;
    border-top-color: #fffde7;
    z-index: 1;
  }

  .speech-bubble p {
    font-size: 18px;
    font-weight: 900;
    color: #2c1a00;
    line-height: 1.3;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-family: 'Georgia', serif;
    font-style: italic;
  }

  @keyframes wobble {
    0%, 100% { transform: rotate(-1deg); }
    50% { transform: rotate(1deg); }
  }

  /* Title */
  .title {
    position: absolute;
    bottom: 12px;
    left: 0;
    right: 0;
    text-align: center;
    color: #c8972a;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-family: Georgia, serif;
    opacity: 0.8;
  }

  /* Horse animation */
  .rider-group {
    position: absolute;
    bottom: 80px;
    right: 40px;
    animation: gallop 0.4s ease-in-out infinite alternate;
  }

  @keyframes gallop {
    from { transform: translateY(0px) rotate(0deg); }
    to { transform: translateY(-8px) rotate(1deg); }
  }

  .dust {
    position: absolute;
    bottom: 60px;
    right: 30px;
    animation: dustAnim 0.5s ease-in-out infinite alternate;
  }

  @keyframes dustAnim {
    from { opacity: 0.3; transform: scale(1); }
    to { opacity: 0.7; transform: scale(1.2); }
  }
</style>
</head>
<body>
<div class="scene">
  <div class="bg">
    <!-- Stars SVG -->
    <svg class="stars" viewBox="0 0 700 600" xmlns="http://www.w3.org/2000/svg">
      <!-- Stars -->
      <circle cx="50" cy="40" r="1.5" fill="white" opacity="0.9"/>
      <circle cx="120" cy="25" r="1" fill="white" opacity="0.7"/>
      <circle cx="200" cy="50" r="1.5" fill="white" opacity="0.8"/>
      <circle cx="300" cy="20" r="1" fill="white" opacity="0.6"/>
      <circle cx="380" cy="45" r="2" fill="white" opacity="0.9"/>
      <circle cx="450" cy="15" r="1" fill="white" opacity="0.7"/>
      <circle cx="520" cy="35" r="1.5" fill="white" opacity="0.8"/>
      <circle cx="600" cy="55" r="1" fill="white" opacity="0.6"/>
      <circle cx="650" cy="28" r="1.5" fill="white" opacity="0.9"/>
      <circle cx="80" cy="90" r="1" fill="white" opacity="0.5"/>
      <circle cx="160" cy="75" r="1.5" fill="white" opacity="0.7"/>
      <circle cx="250" cy="95" r="1" fill="white" opacity="0.8"/>
      <circle cx="340" cy="70" r="1.5" fill="white" opacity="0.6"/>
      <circle cx="480" cy="80" r="1" fill="white" opacity="0.7"/>
      <circle cx="570" cy="65" r="2" fill="white" opacity="0.9"/>
      <circle cx="30" cy="130" r="1" fill="white" opacity="0.5"/>
      <circle cx="680" cy="100" r="1.5" fill="white" opacity="0.7"/>

      <!-- Moon -->
      <circle cx="620" cy="60" r="35" fill="#f5e642" opacity="0.9"/>
      <circle cx="610" cy="55" r="30" fill="#f7eb5a"/>
      <ellipse cx="615" cy="55" rx="28" ry="30" fill="url(#moonGrad)"/>

      <!-- Buildings silhouette (colonial Boston) -->
      <rect x="0" y="350" width="80" height="120" fill="#050f05"/>
      <rect x="10" y="310" width="15" height="40" fill="#050f05"/><!-- chimney -->
      <polygon points="0,350 40,300 80,350" fill="#050f05"/><!-- roof -->

      <rect x="90" y="370" width="60" height="100" fill="#050f05"/>
      <polygon points="90,370 120,330 150,370" fill="#050f05"/>

      <!-- Steeple -->
      <rect x="100" y="250" width="20" height="80" fill="#060e06"/>
      <polygon points="100,250 110,200 120,250" fill="#060e06"/>
      <line x1="110" y1="200" x2="110" y2="185" stroke="#9b7b1a" stroke-width="2"/>
      <rect x="106" y="183" width="8" height="5" fill="#9b7b1a"/>

      <rect x="160" y="380" width="70" height="90" fill="#050f05"/>
      <polygon points="160,380 195,345 230,380" fill="#050f05"/>

      <!-- Ground -->
      <rect x="0" y="460" width="700" height="140" fill="#0a1f05"/>
      <rect x="0" y="500" width="700" height="20" fill="#1a0e03" opacity="0.5"/>

      <!-- Ground details -->
      <path d="M0 460 Q100 450 200 465 Q300 470 400 455 Q500 445 600 460 Q650 465 700 458" stroke="#1a3a0a" stroke-width="2" fill="none"/>

      <defs>
        <radialGradient id="moonGrad" cx="40%" cy="40%">
          <stop offset="0%" stop-color="#fffde0"/>
          <stop offset="100%" stop-color="#e8c840"/>
        </radialGradient>
      </defs>
    </svg>
  </div>

  <!-- Speech bubble -->
  <div class="speech-bubble">
    <p>🎺 The institutions are coming!<br>The institutions are coming!</p>
  </div>

  <!-- Dust clouds -->
  <div class="dust">
    <svg width="120" height="50" viewBox="0 0 120 50">
      <ellipse cx="20" cy="40" rx="18" ry="10" fill="#8b6a3a" opacity="0.4"/>
      <ellipse cx="45" cy="42" rx="22" ry="8" fill="#8b6a3a" opacity="0.3"/>
      <ellipse cx="70" cy="40" rx="16" ry="9" fill="#8b6a3a" opacity="0.35"/>
      <ellipse cx="92" cy="43" rx="20" ry="7" fill="#8b6a3a" opacity="0.25"/>
    </svg>
  </div>

  <!-- Main Rider SVG: Pepe as Paul Revere on horse -->
  <div class="rider-group">
    <svg width="280" height="340" viewBox="0 0 280 340" xmlns="http://www.w3.org/2000/svg">

      <!-- HORSE BODY -->
      <!-- Main horse body -->
      <ellipse cx="145" cy="240" rx="90" ry="52" fill="#8b4513" transform="rotate(-8, 145, 240)"/>
      <!-- Horse neck -->
      <ellipse cx="215" cy="195" rx="28" ry="42" fill="#8b4513" transform="rotate(-20, 215, 195)"/>
      <!-- Horse head -->
      <ellipse cx="245" cy="165" rx="22" ry="18" fill="#8b4513" transform="rotate(-30, 245, 165)"/>
      <!-- Horse snout -->
      <ellipse cx="262" cy="172" rx="14" ry="10" fill="#7a3a10" transform="rotate(-15, 262, 172)"/>
      <!-- Horse nostril -->
      <ellipse cx="268" cy="174" rx="3" ry="2.5" fill="#5a2a08"/>
      <!-- Horse eye -->
      <circle cx="248" cy="160" r="5" fill="#1a0a00"/>
      <circle cx="249" cy="159" r="2" fill="white" opacity="0.6"/>
      <!-- Horse ear -->
      <polygon points="235,148 240,130 248,148" fill="#8b4513"/>
      <polygon points="237,148 240,135 246,148" fill="#c17448"/>
      <!-- Horse mane -->
      <path d="M218 155 Q225 140 230 150 Q235 135 240 148 Q245 130 248 148" stroke="#3d1a00" stroke-width="5" fill="none" stroke-linecap="round"/>

      <!-- Horse legs -->
      <!-- Front legs -->
      <rect x="195" y="275" width="16" height="65" rx="6" fill="#7a3a10" transform="rotate(15, 203, 310)"/>
      <rect x="210" y="275" width="16" height="60" rx="6" fill="#7a3a10" transform="rotate(-5, 218, 305)"/>
      <!-- Back legs -->
      <rect x="95" y="278" width="16" height="62" rx="6" fill="#7a3a10" transform="rotate(-10, 103, 310)"/>
      <rect x="112" y="278" width="16" height="60" rx="6" fill="#7a3a10" transform="rotate(8, 120, 308)"/>

      <!-- Hooves -->
      <ellipse cx="208" cy="338" rx="10" ry="6" fill="#2a1a00"/>
      <ellipse cx="220" cy="332" rx="10" ry="6" fill="#2a1a00"/>
      <ellipse cx="100" cy="336" rx="10" ry="6" fill="#2a1a00"/>
      <ellipse cx="118" cy="334" rx="10" ry="6" fill="#2a1a00"/>

      <!-- Horse tail -->
      <path d="M60 240 Q30 260 20 280 Q15 300 25 310 Q35 295 40 275 Q50 260 60 250" fill="#3d1a00"/>
      <path d="M58 245 Q25 265 18 290 Q14 305 22 312" stroke="#3d1a00" stroke-width="4" fill="none"/>

      <!-- Saddle -->
      <ellipse cx="148" cy="200" rx="50" ry="18" fill="#3d1a00" opacity="0.9"/>
      <ellipse cx="148" cy="198" rx="46" ry="14" fill="#5a2e00"/>

      <!-- Stirrup -->
      <line x1="168" y1="210" x2="175" y2="255" stroke="#8b6914" stroke-width="3"/>
      <rect x="168" y="253" width="16" height="8" rx="3" fill="#8b6914"/>

      <!-- ============ PEPE BODY (riding) ============ -->
      <!-- Pepe body / colonial coat -->
      <ellipse cx="155" cy="148" rx="38" ry="50" fill="#8B0000"/>
      <!-- Coat details -->
      <rect x="148" y="120" width="4" height="50" fill="#6a0000"/><!-- button row -->
      <!-- White collar/cravat -->
      <ellipse cx="155" cy="110" rx="18" ry="12" fill="white"/>
      <polygon points="145,108 155,130 165,108" fill="white"/>
      <!-- Coat lapels -->
      <polygon points="148,108 140,130 155,130" fill="#7a0000"/>
      <polygon points="162,108 170,130 155,130" fill="#7a0000"/>
      <!-- Gold buttons -->
      <circle cx="155" cy="125" r="3" fill="#d4a017"/>
      <circle cx="155" cy="138" r="3" fill="#d4a017"/>
      <circle cx="155" cy="151" r="3" fill="#d4a017"/>
      <!-- Coat cuffs -->
      <rect x="118" y="148" width="20" height="10" rx="4" fill="white"/>
      <rect x="186" y="142" width="20" height="10" rx="4" fill="white"/>

      <!-- PEPE ARMS -->
      <!-- Left arm (holding reins) -->
      <path d="M120 135 Q100 155 95 170 Q100 175 110 170 Q118 160 128 145 Z" fill="#8B0000"/>
      <!-- Left hand (green, holding reins) -->
      <ellipse cx="97" cy="172" rx="12" ry="9" fill="#5a8a00"/>
      <!-- Reins -->
      <path d="M97 172 Q150 185 215 175" stroke="#4a2a00" stroke-width="3" fill="none"/>

      <!-- Right arm (raised, holding lantern) -->
      <path d="M186 130 Q200 110 205 95 Q200 88 192 92 Q188 105 180 122 Z" fill="#8B0000"/>
      <!-- Right hand green -->
      <ellipse cx="204" cy="88" rx="10" ry="8" fill="#5a8a00"/>

      <!-- LANTERN (raised high) -->
      <rect x="196" y="55" width="18" height="26" rx="4" fill="#d4a017" opacity="0.9"/>
      <rect x="198" y="57" width="14" height="22" rx="3" fill="#ff8c00" opacity="0.8"/>
      <!-- Lantern glow -->
      <ellipse cx="205" cy="68" rx="20" ry="20" fill="#ff8c00" opacity="0.15"/>
      <ellipse cx="205" cy="68" rx="30" ry="30" fill="#ff8c00" opacity="0.08"/>
      <!-- Lantern top/handle -->
      <rect x="200" y="50" width="10" height="8" rx="2" fill="#8b6914"/>
      <rect x="203" y="44" width="4" height="9" fill="#8b6914"/>
      <!-- Light rays from lantern -->
      <line x1="205" y1="45" x2="205" y2="35" stroke="#ffcc00" stroke-width="1.5" opacity="0.5"/>
      <line x1="218" y1="52" x2="228" y2="46" stroke="#ffcc00" stroke-width="1.5" opacity="0.5"/>
      <line x1="222" y1="68" x2="234" y2="68" stroke="#ffcc00" stroke-width="1.5" opacity="0.5"/>

      <!-- ============ PEPE HEAD ============ -->
      <!-- Pepe green head -->
      <ellipse cx="155" cy="80" rx="40" ry="42" fill="#5a8a00"/>
      <!-- Pepe cheeks/jowls -->
      <ellipse cx="130" cy="92" rx="16" ry="14" fill="#6a9a00"/>
      <ellipse cx="180" cy="92" rx="16" ry="14" fill="#6a9a00"/>
      <!-- Pepe big lips / mouth area -->
      <ellipse cx="155" cy="100" rx="28" ry="18" fill="#7ab000"/>
      <!-- Pepe mouth (smug/determined) -->
      <path d="M138 104 Q155 112 172 104" stroke="#2a4a00" stroke-width="3" fill="none" stroke-linecap="round"/>
      <!-- Lower lip detail -->
      <path d="M142 108 Q155 118 168 108" stroke="#4a7000" stroke-width="2" fill="none"/>
      <!-- Pepe eyes (half-lidded, classic) -->
      <ellipse cx="138" cy="72" rx="16" ry="14" fill="white"/>
      <ellipse cx="172" cy="72" rx="16" ry="14" fill="white"/>
      <!-- Irises -->
      <circle cx="140" cy="74" r="9" fill="#5a3a1a"/>
      <circle cx="170" cy="74" r="9" fill="#5a3a1a"/>
      <!-- Pupils -->
      <circle cx="141" cy="75" r="5" fill="#1a0a00"/>
      <circle cx="171" cy="75" r="5" fill="#1a0a00"/>
      <!-- Eye whites shine -->
      <circle cx="143" cy="72" r="2.5" fill="white" opacity="0.7"/>
      <circle cx="173" cy="72" r="2.5" fill="white" opacity="0.7"/>
      <!-- Heavy eyelids (Pepe's signature look) -->
      <path d="M122 65 Q138 55 154 65" stroke="#2a4a00" stroke-width="4" fill="none"/>
      <path d="M156 65 Q172 55 188 65" stroke="#2a4a00" stroke-width="4" fill="none"/>
      <!-- Eyebrows (raised/dramatic) -->
      <path d="M122 60 Q138 50 154 58" stroke="#2a4a00" stroke-width="3" fill="none"/>
      <path d="M156 58 Q172 50 188 60" stroke="#2a4a00" stroke-width="3" fill="none"/>
      <!-- Nostrils -->
      <ellipse cx="148" cy="88" rx="5" ry="3.5" fill="#2a4a00"/>
      <ellipse cx="162" cy="88" rx="5" ry="3.5" fill="#2a4a00"/>
      <!-- Ears -->
      <ellipse cx="115" cy="78" rx="8" ry="12" fill="#5a8a00"/>
      <ellipse cx="195" cy="78" rx="8" ry="12" fill="#5a8a00"/>

      <!-- ============ COLONIAL HAT ============ -->
      <!-- Hat brim -->
      <ellipse cx="155" cy="44" rx="52" ry="10" fill="#1a1a1a"/>
      <!-- Hat body (tricorne) -->
      <path d="M113 44 Q120 5 155 8 Q190 5 197 44" fill="#1a1a1a"/>
      <!-- Hat crown -->
      <ellipse cx="155" cy="10" rx="38" ry="8" fill="#1a1a1a"/>
      <!-- Hat brim turned up on sides (tricorne shape) -->
      <path d="M103 44 Q108 36 116 42" fill="#222"/>
      <path d="M207 44 Q202 36 194 42" fill="#222"/>
      <!-- Gold hat band -->
      <path d="M113 44 Q155 50 197 44" stroke="#d4a017" stroke-width="3" fill="none"/>
      <!-- Cockade / ribbon decoration -->
      <circle cx="178" cy="38" r="8" fill="#8B0000"/>
      <circle cx="178" cy="38" r="4" fill="#d4a017"/>

    </svg>
  </div>

  <div class="title">🐸 PAUL REVERE PEPE · 1775 · FEELS HISTORIC MAN 🐸</div>
</div>
</div>
</body>
</html>
